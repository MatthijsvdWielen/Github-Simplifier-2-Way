name: Sync Simplifier to GitHub

on:
  # schedule:
  #  - cron: '0 * * * *' # Runs every hour, or change as needed
  workflow_dispatch: # Allows manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Important: Fetch all history so we can check for conflicts
          fetch-depth: 0 

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Firely Terminal
        run: dotnet tool install -g firely.terminal

      - name: Authenticate & Sync
        env:
          SIMPLIFIER_USERNAME: ${{ secrets.SIMPLIFIER_USERNAME }}
          SIMPLIFIER_PASSWORD: ${{ secrets.SIMPLIFIER_PASSWORD }}
          PROJECT_KEY: 'Github 2-Way Sync'
        run: |
          # Log in non-interactively
          fhir login email="$SIMPLIFIER_USERNAME" password="$SIMPLIFIER_PASSWORD"

          # Link the project
          fhir project link $PROJECT_KEY --strategy TakeRemote || true
          
          # Sync changes from Simplifier to this runner's local folder
          fhir project sync --strategy TakeRemote
          
      - name: Commit and Push Changes + Create 2 PRs (Guides + ALERT)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN}}
        run: |
          set -euo pipefail

          git config --global user.name "Simplifier Sync Bot"
          git config --global user.email "bot@matthijs.com"

          # Ensure we know what we're basing on
          git fetch origin main
          BASE_SHA="$(git rev-parse origin/main)"
          echo "Baseline SHA: $BASE_SHA"

          # Never allow workflow files to be modified/committed by this bot
          git checkout -- .github/workflows || true

          # Create a patch of ALL sync changes and store it OUTSIDE the repo
          git add -A
          git diff --staged > /tmp/sync_changes.patch

          # Reset working copy back to the baseline, fully clean
          git checkout -B main "$BASE_SHA"
          git reset --hard "$BASE_SHA"
          git clean -ffdx

          # ---------------------------------------------------------
          # PR #1: GUIDES / NARRATIVE PR
          # ---------------------------------------------------------
          BRANCH_GUIDES="sync/simplifier-guides-$(date -u +%Y%m%d-%H%M%S)-$RANDOM"
          git checkout -b "$BRANCH_GUIDES" "$BASE_SHA"

          git apply /tmp/sync_changes.patch

          # Never include workflows
          git checkout -- .github/workflows || true

          # Stage only guides + expected metadata
          git add guides/ .simplifier/project.snapshot.json fhirpkg.lock.json || true

          if [[ -n "$(git diff --cached --name-only)" ]]; then
            git commit -m "docs: automated update of IG narrative from Simplifier"
            git push -u origin "$BRANCH_GUIDES"

            gh pr create \
              --base main --head "$BRANCH_GUIDES" \
              --title "📝 Simplifier Narrative Update" \
              --body "Automated sync of IG pages from Simplifier.net."
          else
            echo "No guides/snapshot/lock changes detected; skipping Guides PR."
          fi

          # ---------------------------------------------------------
          # PR #2: ALERT / RESOURCE FAILSAFE
          # ---------------------------------------------------------
          BRANCH_ALERT="sync/simplifier-alert-$(date -u +%Y%m%d-%H%M%S)-$RANDOM"
          git checkout -B "$BRANCH_ALERT" "$BASE_SHA"

          git apply /tmp/sync_changes.patch

          # Never include workflows
          git checkout -- .github/workflows || true

          # Stage everything, then unstage the "expected" stuff
          git add -A
          git reset -- guides/ .simplifier/project.snapshot.json fhirpkg.lock.json || true
          git reset -- .github/workflows || true

          if [[ -n "$(git diff --cached --name-only)" ]]; then
            echo "Unexpected changes detected; creating ALERT PR with these files:"
            git diff --cached --name-only

            git commit -m "alert: unexpected resource changes detected on Simplifier"
            git push -u origin "$BRANCH_ALERT"

            gh pr create \
              --base main --head "$BRANCH_ALERT" \
              --title "⚠️ ALERT: Unexpected Resource Changes" \
              --body "Changes detected outside guides/ and the expected sync metadata files. Review carefully."
          else
            echo "No unexpected changes detected; skipping ALERT PR."
          fi

